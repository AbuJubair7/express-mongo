services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: express-mongo-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"

  mongo:
    image: mongo:7
    container_name: express-mongo-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: express_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
